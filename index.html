<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Final</title>
    <style>
        .tarjeta{
            border: 2px solid #333;
            padding: 15px;
            margin: 5px;
            border-radius: 10px;
            width: 200px;
            background-color: #f9f9f9;
            display: inline-block;
            vertical-align: top;
            box-shadow: 2px 2px 5px grey;
        }
    </style>
</head>
<body>
    <header class="bg-black w-full h-20 flex justify-center p-5">
        <h1 class="text-white text-2xl">Menú para Restaurante</h1>
    </header>

    <main>

        <div class="border-2 rounded m-5 gap-1 p-5 mt-20 flex ">
            <div id="div1"></div>
            <br>
            <div id="divv"></div>
        </div>
        

        <div class="bg-slate-500 gap-2 p-2 flex flex-col justify-center items-center border rounded  w-50 mt-5 m-5">
            <input placeholder="hola..." class="border rounded bg-white" id="input1" type="text">
            <select class="border rounded bg-white" name="" id="sele">
                <option value=""></option>
                <option value="Lunes">LUNES</option>
                <option value="Martes">MARTES</option>
                <option value="Miércoles">MIÉRCOLES</option>
                <option value="Jueves">JUEVES</option>
                <option value="Viernes">VIERNES</option>
                <option value="Sábado">SÁBADO</option>
                <option value="Domingo">DOMINGO</option>
            </select>
        </div>

        <div class="border rounded p-5 mt-5 m-5 flex flex-col justify-center items-center bg-orange-200">
            <div class="flex" id="cartas"></div>
            <button class="rounded border mt-5 p-1 bg-slate-50 text-sm" id="boton2">Borrar</button>
        </div>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="index.js"></script>
</body>
</html>
